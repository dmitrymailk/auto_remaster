# Dataset configuration
# dataset_name: dim/nfs_pix2pix_1920_1080_v5
# dataset_name: dim/nfs_pix2pix_1920_1080_v5_upscale_2x_raw
# dataset_name: dim/nfs_pix2pix_1920_1080_v6
# dataset_name: dim/render_nfs_4screens_6_sdxl_1_wan_mix
# dataset_name: dim/nfs_pix2pix_1920_1080_v6_upscale_2x_raw
dataset_name: dim/nfs_pix2pix_1920_1080_v6_2x_flux_klein_4B_lora
# Cache directory

cache_dir: dataset/nfs_pix2pix_1920_1080_v6_2x_flux_klein_4B_lora
dataset_config: null
seed: 2025

# Output configuration
output_dir: checkpoints/auto_remaster/lbm_train_test_gap_gan
logging_dir: logs

# Training optimization parameters
learning_rate: 5e-6
lr_scheduler_type: "constant"
warmup_steps: 100
weight_decay: 1e-2
max_grad_norm: 1.0
per_device_train_batch_size: 2
# per_device_train_batch_size: 8
gradient_accumulation_steps: 1
gradient_checkpointing: false
dataloader_num_workers: 4

# Training duration
# max_steps: 15000
max_steps: 300000
# save_steps: 500
# save_steps: 500
save_steps: 1600
save_total_limit: 1
resume_from_checkpoint: false
eval_on_start: false

# Reporting
report_to: wandb

# Diffusion/LBM specific parameters
# resolution: 320
resolution: 512
use_ema: false
scale_lr: false

# Dataset column names
source_image_name: input_image
target_image_name: edited_image
caption_column: edit_prompt



# Inference parameters
num_inference_steps: 1

# Metrics for evaluation
metrics_list: [
    "lpips",
    "mse",
    "ssim",
    "dists",
    "psnr",
    "fid",
]

# Loss weights (for compatibility, not used in LBM)
lpips_factor: 1.0
gan_factor: 0.5
lecam_loss_weight: 0.1

# LBM specific parameters
bridge_noise_sigma: 0.01
timestep_sampling: "custom_timesteps"  # Options: "uniform", "custom_timesteps"
logit_mean: 0.0  # For log_normal timestep_sampling
logit_std: 1.0   # For log_normal timestep_sampling
latent_loss_weight: 1.0
latent_loss_type: "l1"  # Options: "l2", "l1"

# Tracker project name
tracker_project_name: auto_remaster

# Optional parameters (defaults)
noise_offset: 0.0
input_perturbation: 0.1
revision: null
variant: null
non_ema_revision: null

use_lecam: true
discriminator_type: r3gan
gan_loss_type: r3gan
r3gan_gamma: 1.0
learning_rate_disc: 1e-5
disc_warmup_steps: 100
d_noise_std: 0.0
d_noise_anneal_steps: 5000
d_train_every: 1
self_generation_prob: 0.5
