# Dataset configuration
dataset_name: dim/nfs_pix2pix_1920_1080_v6_2x_flux_klein_4B_lora
cache_dir: dataset/nfs_pix2pix_1920_1080_v6_2x_flux_klein_4B_lora
dataset_config: null
seed: 2025

# Output configuration
output_dir: checkpoints/auto_remaster/lbm_meanflow
logging_dir: logs

# Training optimization parameters
learning_rate: 5e-6
lr_scheduler_type: "constant"
warmup_steps: 100
weight_decay: 1e-2
max_grad_norm: 1.0
per_device_train_batch_size: 2
gradient_accumulation_steps: 1
gradient_checkpointing: false
dataloader_num_workers: 4

# Training duration
max_steps: 300000
save_steps: 500
save_total_limit: 3
resume_from_checkpoint: false
eval_on_start: false

# Reporting
report_to: wandb

# Diffusion/LBM specific parameters
resolution: 512
use_ema: false
scale_lr: false

# Dataset column names
source_image_name: input_image
target_image_name: edited_image
caption_column: edit_prompt

# Inference parameters (MeanFlow is one-step)
num_inference_steps: 1

# Metrics for evaluation
metrics_list: [
    "lpips",
    "mse",
    "ssim",
    "dists",
    "psnr",
    "fid",
]

# Loss weights
lpips_factor: 1.0
latent_loss_weight: 1.0
latent_loss_type: "l2"

# LBM bridge noise (used in interpolant)
bridge_noise_sigma: 0.001

# MeanFlow specific parameters
meanflow_p_mean: 0.0
meanflow_p_std: 1.0
consistency_ratio: 1.0

# Tracker project name
tracker_project_name: auto_remaster

# Optional parameters (defaults)
noise_offset: 0.0
input_perturbation: 0.0
revision: null
variant: null
non_ema_revision: null
